name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Verify plugin.json version matches tag
        run: |
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          # Remove 'v' prefix for comparison
          VERSION_NUM="${TAG_VERSION#v}"
          PLUGIN_VERSION=$(cat .claude-plugin/plugin.json | grep '"version"' | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          if [ "$VERSION_NUM" != "$PLUGIN_VERSION" ]; then
            echo "ERROR: Tag version ($VERSION_NUM) does not match plugin.json version ($PLUGIN_VERSION)"
            echo "Please update .claude-plugin/plugin.json version to $VERSION_NUM before tagging"
            exit 1
          fi
          echo "Version check passed: $VERSION_NUM"

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            # First release, get all commits
            COMMITS=$(git log --pretty=format:"- %s" --reverse)
          else
            # Get commits since last tag
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --reverse)
          fi

          # Save to file for multiline output
          echo "$COMMITS" > /tmp/changelog.txt

          # Create release notes
          cat > /tmp/release_notes.md << EOF
          ## What's Changed

          $COMMITS

          ## Installation

          \`\`\`bash
          # Claude Code
          /plugin marketplace add galando/temper
          /plugin install temper
          \`\`\`

          **Full Changelog**: https://github.com/galando/temper/commits/${{ steps.version.outputs.VERSION }}
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
